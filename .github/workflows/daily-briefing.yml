name: Daily Briefing

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional briefing target date in YYYY-MM-DD format"
        required: false
        type: string
  schedule:
    # 22:00 UTC = 07:00 KST
    - cron: "0 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Node dependencies
        run: npm install

      - name: Run quality checks and operational trace
        run: make ci-quality PYTHON=python
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TODAYINTECH_TARGET_DATE: ${{ inputs.target_date }}

      - name: Generate briefing
        run: make generate-openai PYTHON=python
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TODAYINTECH_TARGET_DATE: ${{ inputs.target_date }}
          TODAYINTECH_RAW_OUTPUT_DIR: .artifacts/raw
          TODAYINTECH_PROCESSED_OUTPUT_DIR: .artifacts/processed
          TODAYINTECH_ENRICHED_OUTPUT_DIR: .artifacts/enriched
          TODAYINTECH_ENRICHMENT_CACHE_DIR: .artifacts/enrichment-cache
          TODAYINTECH_TRACE_OUTPUT_DIR: .artifacts/traces
          TODAYINTECH_MAX_CANDIDATES_PER_SERVICE: "4"
          TODAYINTECH_MAX_CANDIDATES_TOTAL: "50"

      - name: Upload quality artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-reports
          path: |
            .artifacts/raw/
            .artifacts/processed/
            .artifacts/enriched/
            .artifacts/reports/
            .artifacts/traces/
          if-no-files-found: ignore

      - name: Publish trace history
        if: always()
        env:
          TRACE_HISTORY_BRANCH: tracing-history
          TRACE_HISTORY_SOURCE_DIR: .artifacts/traces
        run: |
          set -euo pipefail

          if [ ! -d "$TRACE_HISTORY_SOURCE_DIR" ]; then
            echo "No trace artifacts found. Skipping trace history publish."
            exit 0
          fi

          git config user.name "choi-hyk"
          git config user.email "blindlchoil@gmail.com"

          TRACE_HISTORY_DIR="$RUNNER_TEMP/tracing-history"
          git fetch origin "$TRACE_HISTORY_BRANCH" || true

          if git show-ref --verify --quiet "refs/remotes/origin/$TRACE_HISTORY_BRANCH"; then
            git worktree add "$TRACE_HISTORY_DIR" "origin/$TRACE_HISTORY_BRANCH"
            git -C "$TRACE_HISTORY_DIR" checkout -B "$TRACE_HISTORY_BRANCH"
          else
            git worktree add --detach "$TRACE_HISTORY_DIR"
            git -C "$TRACE_HISTORY_DIR" checkout --orphan "$TRACE_HISTORY_BRANCH"
            git -C "$TRACE_HISTORY_DIR" rm -rf . || true
          fi

          mkdir -p "$TRACE_HISTORY_DIR/traces"
          cp -R "$TRACE_HISTORY_SOURCE_DIR/." "$TRACE_HISTORY_DIR/traces/"

          git -C "$TRACE_HISTORY_DIR" add traces

          if git -C "$TRACE_HISTORY_DIR" diff --cached --quiet; then
            echo "No trace history changes to publish."
            exit 0
          fi

          git -C "$TRACE_HISTORY_DIR" commit \
            -m "chore(trace): update operational trace history"
          git -C "$TRACE_HISTORY_DIR" push origin "$TRACE_HISTORY_BRANCH"

      - name: Build Operations dashboard data
        if: always()
        run: |
          set -euo pipefail
          make fetch-trace-history TRACE_HISTORY_DIR=.artifacts/tracing-history
          make build-operations PYTHON=python TRACE_HISTORY_DIR=.artifacts/tracing-history

      - name: Publish generated archive state
        env:
          TARGET_BRANCH: ${{ github.ref_name }}
          BRIEFING_TARGET_DATE: ${{ inputs.target_date }}
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
          WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail

          git config user.name "choi-hyk"
          git config user.email "blindlchoil@gmail.com"

          git add docs data/briefed_articles.json

          if git diff --cached --quiet; then
            echo "No generated archive changes to publish."
            exit 0
          fi

          BRIEFING_DATE="${BRIEFING_TARGET_DATE:-$(TZ=Asia/Seoul date +%F)}"
          COMMIT_MESSAGE_FILE="$RUNNER_TEMP/generated-archive-commit-message.txt"
          ADDED_SOURCE_COUNT="$(git diff --cached --name-only --diff-filter=A | wc -l | tr -d ' ')"

          {
            printf 'todayintech 갱신 %s\n' "$BRIEFING_DATE"
            printf '\nDaily Briefing 워크플로가 생성한 아카이브 갱신 내역입니다.\n'
            printf '\n## 실행 정보\n'
            printf -- '- 기준일: %s\n' "$BRIEFING_DATE"
            printf -- '- 추가된 소스: %s개\n' "$ADDED_SOURCE_COUNT"
            printf -- '- 실행 기록: %s\n' "$WORKFLOW_RUN_URL"
            printf '\n## 추가된 소스\n'
          } > "$COMMIT_MESSAGE_FILE"

          if [ "$ADDED_SOURCE_COUNT" -eq 0 ]; then
            printf '%s\n' '- 없음' >> "$COMMIT_MESSAGE_FILE"
          else
            git diff --cached --name-only --diff-filter=A |
              while IFS= read -r source_path; do
                printf -- '- [%s](%s/blob/%s/%s)\n' \
                  "$source_path" "$REPOSITORY_URL" "$TARGET_BRANCH" "$source_path"
              done >> "$COMMIT_MESSAGE_FILE"
          fi

          git commit -F "$RUNNER_TEMP/generated-archive-commit-message.txt"

          git pull --rebase --autostash origin "$TARGET_BRANCH"
          git push origin "HEAD:$TARGET_BRANCH"

      - name: Build Docusaurus
        run: make build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
