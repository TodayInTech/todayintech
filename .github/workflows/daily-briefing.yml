name: Daily Briefing

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Optional briefing target date in YYYY-MM-DD format"
        required: false
        type: string
  schedule:
    # 22:00 UTC = 07:00 KST
    - cron: "0 22 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python dependencies
        run: pip install -e .

      - name: Install Node dependencies
        run: npm install

      - name: Generate briefing
        run: make generate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TODAYINTECH_TARGET_DATE: ${{ inputs.target_date }}

      - name: Build Docusaurus
        run: make build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
